<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lector QR Segur</title>
  <script src="https://unpkg.com/jsqr"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #121212; color: white; height: 100vh; display: flex; flex-direction: column; }
    #video { width: 100%; height: 45vh; object-fit: cover; background: #000; }
    #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #121212; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    input { padding: 15px; font-size: 20px; border-radius: 8px; border: 2px solid #444; margin-bottom: 15px; width: 70%; text-align: center; background: #222; color: white; }
    .btn { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }
    #result { flex: 1; padding: 20px; text-align: center; font-size: 20px; }
    .ok { background: #28a745; }
    .error { background: #dc3545; }
    #debug { font-family: monospace; font-size: 11px; color: #888; margin-top: 10px; word-break: break-all; padding: 10px; border-top: 1px solid #333; }
  </style>
</head>
<body>

  <div id="login-screen" id="lScreen">
    <h2 style="color: #28a745;">🔑 ACCÉS REQUERIT</h2>
    <p>Introdueix el codi (987654):</p>
    <input type="password" id="passInput" placeholder="Codi Auth">
    <button class="btn" onclick="login()">ENTRAR</button>
  </div>

  <video id="video" autoplay playsinline></video>
  <div id="result">📷 Esperant QR...</div>
  <div id="debug"></div>

<script>
  const SCRIPT_ID = "AKfycbxNlN_OM3oqI_I1SGIMxi6MmbtJV2iek49bOpuEX8GQMlly5rWTvRF_dKeKc2DJA9RHJw";
  let scanning = true;
  let token = localStorage.getItem('auth_token');

  // Si tenim token, amaguem login i comencem
  if (token) {
    document.getElementById('login-screen').style.display = 'none';
    startCamera();
  }

  function login() {
    const val = document.getElementById('passInput').value;
    if (val === "987654") {
      localStorage.setItem('auth_token', val);
      location.reload();
    } else {
      alert("Codi incorrecte");
    }
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      const video = document.getElementById('video');
      video.srcObject = stream;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      
      setInterval(() => {
        if (!scanning) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code) { scanning = false; processQR(code.data); }
      }, 500);
    });
  }

  function processQR(qr) {
    const resDiv = document.getElementById("result");
    const debugDiv = document.getElementById("debug");
    resDiv.innerHTML = "⏳ Validant...";

    // Extreure ID del QR (assumint format URL o separador | )
    let id_reserva = qr;
    if (qr.includes("id_reserva=")) {
       id_reserva = new URL(qr).searchParams.get("id_reserva");
    } else if (qr.includes("|")) {
       id_reserva = qr.split("|")[0];
    }

    const url = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`
      + `?callback=handleResponse`
      + `&id_reserva=${encodeURIComponent(id_reserva)}`
      + `&auth=${encodeURIComponent(token)}`
      + `&origin=${encodeURIComponent(window.location.hostname)}`;

    debugDiv.innerText = "URL Enviada: " + url;

    const script = document.createElement("script");
    script.src = url;
    script.onerror = () => {
      resDiv.className = "error";
      resDiv.innerText = "❌ ERROR CRÍTIC DE CONNEXIÓ";
    };
    document.body.appendChild(script);
  }

  window.handleResponse = function(data) {
    const resDiv = document.getElementById("result");
    resDiv.className = (data.estat === "correcte") ? "ok" : "error";
    
    if (data.estat === "error_auth") {
       localStorage.removeItem('auth_token');
       resDiv.innerHTML = "⚠ ERROR D'AUTORITZACIÓ. Reiniciant...";
       setTimeout(() => location.reload(), 2000);
       return;
    }

    resDiv.innerHTML = `
      <div style="font-size:24px; font-weight:bold;">${data.missatge}</div>
      <p>${data.nom || ''} (${data.persones || '0'} pers.)</p>
      <button class="btn" onclick="reset()">SEGÜENT</button>
    `;
  };

  function reset() {
    scanning = true;
    const resDiv = document.getElementById("result");
    resDiv.className = "";
    resDiv.innerHTML = "📷 Esperant QR...";
  }
</script>
</body>
</html>
