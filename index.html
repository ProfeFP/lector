<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control d'Accessos</title>
  <script src="https://unpkg.com/jsqr"></script>
  <style>
    :root {
      --bg-color: #121212;
      --ok-color: #27ae60;
      --error-color: #c0392b;
      --warning-color: #f39c12;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 📷 Càmera al 50% */
    #video-container {
      position: relative;
      width: 100%;
      height: 45vh; /* Una mica menys per deixar espai */
      background: #000;
    }

    #video { width: 100%; height: 100%; object-fit: cover; }

    .scanner-line {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: rgba(0, 255, 0, 0.6);
      box-shadow: 0 0 8px 2px rgba(0, 255, 0, 0.8);
      animation: scan 2s infinite linear;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* 🎛️ Zona de resultats */
    #result-container {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      overflow-y: auto; /* Permet scroll si no cap */
      transition: background 0.3s;
    }

    .status-msg {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .data-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 4px 0;
    }

    .data-label { color: #ccc; font-size: 12px; }

    /* Botó visible i gran */
    .btn-next {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      margin-top: 10px;
      width: 100%;
      cursor: pointer;
    }

    .state-waiting { background: #1a1a1a; }
    .state-ok { background: var(--ok-color); }
    .state-error { background: var(--error-color); }
    .state-warning { background: var(--warning-color); }

    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body class="state-waiting">

  <div id="video-container">
    <video id="video" autoplay playsinline></video>
    <div class="scanner-line"></div>
  </div>

  <div id="result-container">
    <div id="loading">⏳ VALIDANT...</div>
    
    <div id="status-text" class="status-msg">ESCANEJA UN CODI</div>
    
    <div id="info-panel" style="display: none;">
      <div class="data-card">
        <div class="data-row"><span class="data-label">Nom:</span> <b id="res-nom">-</b></div>
        <div class="data-row"><span class="data-label">Edifici:</span> <span id="res-edifici">-</span></div>
        <div class="data-row"><span class="data-label">Sessió:</span> <span id="res-sessio">-</span></div>
        <div class="data-row"><span class="data-label">Persones:</span> <b id="res-persones">-</b></div>
        <div class="data-row"><span class="data-label">Tiquet:</span> <span id="res-tiquet">-</span></div>
      </div>
      <button class="btn-next" onclick="resetScanner()">SEGÜENT PERSONA</button>
    </div>
  </div>

<script>
  let scanning = true;
  const video = document.getElementById('video');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { video.srcObject = stream; requestAnimationFrame(tick); });

  function tick() {
    if (scanning && video.readyState === video.HAVE_ENOUGH_DATA) {
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
      if (code) { scanning = false; processQR(code.data); }
    }
    requestAnimationFrame(tick);
  }

  function processQR(qrUrl) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('status-text').style.display = 'none';
    
    try {
      // Netegem la URL per si ve amb espais o caràcters estranys
      const cleanUrl = qrUrl.trim();
      const urlObj = new URL(cleanUrl);
      const id_reserva = urlObj.searchParams.get("id_reserva");
      const ticket = urlObj.searchParams.get("ticket") || "1";

      const scriptBase = "https://script.google.com/macros/s/AKfycbxNlN_OM3oqI_I1SGIMxi6MmbtJV2iek49bOpuEX8GQMlly5rWTvRF_dKeKc2DJA9RHJw/exec";
      const finalUrl = `${scriptBase}?callback=handleResponse&accio=entrades&id_reserva=${id_reserva}&ticket=${ticket}`;

      const script = document.createElement("script");
      script.src = finalUrl;
      script.onerror = () => showError("ERROR DE CONNEXIÓ");
      document.body.appendChild(script);
    } catch (e) {
      showError("QR NO VÀLID");
    }
  }

  window.handleResponse = function(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('status-text').style.display = 'block';
    document.getElementById('info-panel').style.display = 'block';

    if (data.estat === "correcte") {
      document.body.className = "state-ok";
      document.getElementById('status-text').innerText = "✅ ACCÉS OK";
    } else if (data.estat === "ja_validat") {
      document.body.className = "state-warning";
      document.getElementById('status-text').innerText = "⚠️ JA VALIDAT";
    } else {
      document.body.className = "state-error";
      document.getElementById('status-text').innerText = "❌ ERROR";
    }

    document.getElementById('res-nom').innerText = data.nom || '---';
    document.getElementById('res-edifici').innerText = data.edifici || '---';
    document.getElementById('res-sessio').innerText = (data.dia || '') + " " + (data.hora_inici || '');
    document.getElementById('res-persones').innerText = data.persones || '-';
    document.getElementById('res-tiquet').innerText = data.tiquet || '-';
  };

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('status-text').style.display = 'block';
    document.body.className = "state-error";
    document.getElementById('status-text').innerText = msg;
    document.getElementById('info-panel').style.display = 'block';
  }

  function resetScanner() {
    scanning = true;
    document.body.className = "state-waiting";
    document.getElementById('status-text').innerText = "ESCANEJA UN CODI";
    document.getElementById('info-panel').style.display = 'none';
  }
</script>
</body>
</html>
