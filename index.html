<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control d'Accessos</title>

<script src="https://unpkg.com/jsqr"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
}

#video {
  width: 100%;
  height: 50vh;
  object-fit: cover;
  background: black;
}

#controls {
  margin: 10px;
}

button {
  font-size: 18px;
  padding: 12px 20px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.start { background: #28a745; color: white; }
.stop { background: #dc3545; color: white; }

#result {
  margin: 10px;
  padding: 20px;
  font-size: 20px;
  border-radius: 10px;
  min-height: 120px;
}

.ok { background: #28a745; }
.error { background: #dc3545; }

.big {
  font-size: 30px;
  font-weight: bold;
  margin-bottom: 10px;
}

.info {
  font-size: 18px;
  line-height: 1.5;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="controls">
  <button class="stop" onclick="stopScan()">⏸️ Pausar</button>
  <button class="start" onclick="startScan()">▶️ Escanejar</button>
</div>

<div id="result">Escanejant...</div>

<script>
let scanning = true;
let video = document.getElementById('video');

// 📷 Activar càmera
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {
  video.srcObject = stream;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  setInterval(() => {
    if (!scanning) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
      scanning = false;
      processQR(code.data);
    }
  }, 400);
})
.catch(err => {
  document.getElementById("result").innerText = "Error càmera: " + err;
});

// ▶️ Reprendre escaneig
function startScan() {
  scanning = true;
  const div = document.getElementById("result");
  div.className = "";
  div.innerText = "Escanejant...";
}

// ⏸️ Pausar
function stopScan() {
  scanning = false;
}

// 🔗 Enviar QR → GAS (JSONP)
function processQR(qr) {
  document.getElementById("result").innerText = "Validant...";

  // Format QR: RS021FB3S|1
  const parts = qr.split("|");
  const id_reserva = parts[0];
  const ticket = parts[1] || 1;

  const url = "https://script.google.com/macros/s/AKfycbxNlN_OM3oqI_I1SGIMxi6MmbtJV2iek49bOpuEX8GQMlly5rWTvRF_dKeKc2DJA9RHJw/exec"
    + "?accio=entrades"
    + "&id_reserva=" + encodeURIComponent(id_reserva)
    + "&ticket=" + encodeURIComponent(ticket)
    + "&callback=handleResponse";

  console.log("Cridant:", url);

  const script = document.createElement("script");
  script.src = url;
  document.body.appendChild(script);
}

// 📥 Resposta del GAS
function handleResponse(data) {
  const div = document.getElementById("result");

  if (data.estat === "correcte") {
    div.className = "ok";
    navigator.vibrate(200);
  } else {
    div.className = "error";
    navigator.vibrate([100, 50, 100]);
  }

  div.innerHTML = `
    <div class="big">${data.missatge}</div>
    <div class="info">
      👤 <b>${data.nom}</b><br>
      🏛️ ${data.edifici}<br>
      📅 ${data.dia} - ${data.hora_inici}<br>
      👥 ${data.persones} persones<br>
      🎟️ Ticket ${data.tiquet}<br>
      ⏱️ ${data.hora_validacio}
    </div>
  `;
}
</script>

</body>
</html>
