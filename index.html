<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lector de Codis QR - Control d'Accés</title>
  <script src="https://unpkg.com/jsqr"></script>
  <style>
    :root {
      --bg-color: #121212;
      --ok-color: #27ae60;
      --error-color: #c0392b;
      --warning-color: #f39c12;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 📷 CONTENIDOR DE CÀMERA (45% de l'alçada) */
    #video-container {
      position: relative;
      width: 100%;
      height: 45vh;
      background: #000;
      border-bottom: 2px solid #333;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Línia d'escaneig animada */
    .scanner-line {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: rgba(0, 255, 0, 0.6);
      box-shadow: 0 0 8px 2px rgba(0, 255, 0, 0.8);
      animation: scan 2s infinite linear;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* 🎛️ ZONA DE RESULTATS (55% de l'alçada) */
    #result-container {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      transition: background 0.3s ease;
      overflow-y: auto;
    }

    .status-msg {
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Targeta de dades compacta */
    .data-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 6px 0;
    }

    .data-row:last-child { border-bottom: none; }

    .data-label { color: #ddd; font-size: 13px; font-weight: normal; }
    .data-value { font-size: 16px; font-weight: bold; }

    /* Botó Següent - Sempre visible */
    .btn-next {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      margin-top: auto; /* Empeny el botó al final */
    }

    /* Estats per colors */
    .state-waiting { background: #1a1a1a; }
    .state-ok { background: var(--ok-color); }
    .state-error { background: var(--error-color); }
    .state-warning { background: var(--warning-color); }

    #loading-overlay {
      display: none;
      text-align: center;
      padding: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body class="state-waiting">

  <div id="video-container">
    <video id="video" autoplay playsinline></video>
    <div class="scanner-line"></div>
  </div>

  <div id="result-container">
    <div id="loading-overlay">⏳ VALIDANT TIQUET...</div>
    
    <div id="status-text" class="status-msg">ESPERANT LECTURA...</div>
    
    <div id="info-panel" style="display: none;">
      <div class="data-card">
        <div class="data-row"><span class="data-label">Nom:</span> <span class="data-value" id="res-nom">-</span></div>
        <div class="data-row"><span class="data-label">Edifici:</span> <span class="data-value" id="res-edifici">-</span></div>
        <div class="data-row"><span class="data-label">Sessió:</span> <span class="data-value" id="res-sessio">-</span></div>
        <div class="data-row"><span class="data-label">Persones:</span> <span class="data-value" id="res-persones">-</span></div>
        <div class="data-row"><span class="data-label">Tiquet:</span> <span class="data-value" id="res-tiquet">-</span></div>
      </div>
      <button class="btn-next" onclick="resetScanner()">👉 SEGÜENT PERSONA</button>
    </div>

    <div id="idle-msg" style="text-align: center; color: #888; margin-top: 10px;">
      Enquadreu el codi QR de l'entrada per validar l'accés.
    </div>
  </div>

<script>
  let scanning = true;
  const video = document.getElementById('video');
  const body = document.body;

  // 1. Engegar càmera
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      video.srcObject = stream;
      requestAnimationFrame(tick);
    })
    .catch(err => {
      document.getElementById('status-text').innerText = "ERROR CÀMERA";
      console.error(err);
    });

  function tick() {
    if (scanning && video.readyState === video.HAVE_ENOUGH_DATA) {
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code) {
        scanning = false;
        processQR(code.data);
      }
    }
    requestAnimationFrame(tick);
  }

  // 2. Processar el QR i cridar a Google Apps Script
  function processQR(qrUrl) {
    document.getElementById('loading-overlay').style.display = 'block';
    document.getElementById('status-text').style.display = 'none';
    document.getElementById('idle-msg').style.display = 'none';
    
    try {
      // Netegem la URL i n'extraiem els paràmetres
      const urlObj = new URL(qrUrl.trim());
      const id_reserva = urlObj.searchParams.get("id_reserva");
      const ticket = urlObj.searchParams.get("ticket") || "1";

      if (!id_reserva) throw new Error("QR no vàlid");

      // ID del teu script per evitar redireccions de compte de Chrome (/u/2/)
      const scriptID = "AKfycbxNlN_OM3oqI_I1SGIMxi6MmbtJV2iek49bOpuEX8GQMlly5rWTvRF_dKeKc2DJA9RHJw";
      const finalUrl = `https://script.google.com/macros/s/${scriptID}/exec`
                     + `?callback=handleResponse`
                     + `&accio=entrades`
                     + `&id_reserva=${encodeURIComponent(id_reserva)}`
                     + `&ticket=${encodeURIComponent(ticket)}`
                     + `&t=${new Date().getTime()}`; // Evita la memòria cau

      // Injecció de Script per JSONP
      const script = document.createElement("script");
      script.src = finalUrl;
      script.onerror = () => showError("ERROR DE CONNEXIÓ SERVIDOR");
      document.body.appendChild(script);

    } catch (e) {
      showError("CODI QR NO RECONEGUT");
    }
  }

  // 3. Rebre la resposta del servidor
  window.handleResponse = function(data) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('status-text').style.display = 'block';
    document.getElementById('info-panel').style.display = 'block';

    if (data.estat === "correcte") {
      body.className = "state-ok";
      document.getElementById('status-text').innerText = "✅ ACCÉS PERMÈS";
      navigator.vibrate(200);
    } else if (data.estat === "ja_validat") {
      body.className = "state-warning";
      document.getElementById('status-text').innerText = "⚠️ JA VALIDAT";
      navigator.vibrate([100, 50, 100]);
    } else {
      body.className = "state-error";
      document.getElementById('status-text').innerText = "❌ ERROR: " + (data.missatge || "NO TROBAT");
      navigator.vibrate(500);
    }

    // Omplir dades a la targeta
    document.getElementById('res-nom').innerText = data.nom || '---';
    document.getElementById('res-edifici').innerText = data.edifici || '---';
    document.getElementById('res-sessio').innerText = (data.dia || '') + " " + (data.hora_inici || '');
    document.getElementById('res-persones').innerText = data.persones || '-';
    document.getElementById('res-tiquet').innerText = data.tiquet || '-';
  };

  function showError(msg) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('status-text').style.display = 'block';
    body.className = "state-error";
    document.getElementById('status-text').innerText = msg;
    document.getElementById('info-panel').style.display = 'block';
  }

  function resetScanner() {
    scanning = true;
    body.className = "state-waiting";
    document.getElementById('status-text').innerText = "ESPERANT LECTURA...";
    document.getElementById('info-panel').style.display = 'none';
    document.getElementById('idle-msg').style.display = 'block';
  }
</script>

</body>
</html>
