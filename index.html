<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lector QR Corporatiu</title>
  <script src="https://unpkg.com/jsqr"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #121212; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #video { width: 100%; height: 45vh; object-fit: cover; background: #000; }
    #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #121212; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    input { padding: 15px; font-size: 20px; border-radius: 8px; border: 2px solid #444; margin-bottom: 15px; width: 80%; text-align: center; background: #222; color: white; }
    .btn { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 80%; }
    #result { flex: 1; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
    .ok { background: #28a745; }
    .error { background: #dc3545; }
    #debug-url { font-family: monospace; font-size: 10px; color: #666; word-break: break-all; margin-top: 10px; padding: 5px; border-top: 1px solid #333; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2 style="color: #28a745;">🔐 IDENTIFICACIÓ</h2>
    <p>Introdueix el teu codi de voluntari:</p>
    <input type="text" id="passInput" placeholder="Codi Personal">
    <button class="btn" onclick="login()">ACTIVAR LECTOR</button>
  </div>

  <video id="video" autoplay playsinline></video>
  
  <div id="result">
    <div id="status-text">📷 Esperant QR...</div>
    <div id="data-display"></div>
  </div>

  <div id="debug-url"></div>

<script>
  const SCRIPT_ID = "AKfycbxNlN_OM3oqI_I1SGIMxi6MmbtJV2iek49bOpuEX8GQMlly5rWTvRF_dKeKc2DJA9RHJw";
  let scanning = true;
  let userAuth = localStorage.getItem('auth_voluntari');

  // Si ja s'ha identificat abans, entrem directament
  if (userAuth) {
    document.getElementById('login-screen').style.display = 'none';
    startCamera();
  }

  function login() {
    const val = document.getElementById('passInput').value.trim();
    if (val.length > 2) {
      localStorage.setItem('auth_voluntari', val);
      location.reload();
    } else {
      alert("Codi massa curt");
    }
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      const video = document.getElementById('video');
      video.srcObject = stream;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      
      const loop = () => {
        if (scanning && video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);
          const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
          if (code) { 
            scanning = false; 
            processQR(code.data); 
          }
        }
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    });
  }

  function processQR(qr) {
    const status = document.getElementById("status-text");
    status.innerHTML = "⏳ Validant amb el servidor...";

    // Extreure l'ID_RESERVA netament de la URL del QR
    let id_reserva = qr;
    try {
      if (qr.includes("id_reserva=")) {
        id_reserva = new URL(qr).searchParams.get("id_reserva");
      }
    } catch(e) { console.log("QR no és URL"); }

    // CONSTRUCCIÓ NETEJA: Només cap a script.google.com
    const finalUrl = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`
      + `?callback=handleResponse`
      + `&id_reserva=${encodeURIComponent(id_reserva)}`
      + `&auth=${encodeURIComponent(userAuth)}`
      + `&origin=${encodeURIComponent(window.location.hostname)}`
      + `&t=${new Date().getTime()}`;

    // Mostrem la URL per verificar que no hi hagi "basura" de Google Search
    document.getElementById("debug-url").innerText = "Enviant a: " + finalUrl;

    const script = document.createElement("script");
    script.src = finalUrl;
    script.onerror = () => {
      document.getElementById("result").className = "error";
      status.innerText = "❌ ERROR DE CONNEXIÓ (GAS)";
    };
    document.body.appendChild(script);
  }

  window.handleResponse = function(data) {
    const resDiv = document.getElementById("result");
    const status = document.getElementById("status-text");
    const display = document.getElementById("data-display");

    resDiv.className = (data.estat === "correcte") ? "ok" : "error";
    
    if (data.estat === "error_auth") {
       localStorage.removeItem('auth_voluntari');
       status.innerText = "⚠ CODI VOLUNTARI NO VÀLID";
       setTimeout(() => location.reload(), 2000);
       return;
    }

    status.innerHTML = `<div style="font-size:28px;">${data.missatge}</div>`;
    display.innerHTML = `
      <p>👤 ${data.nom || '-'}<br>👥 ${data.persones || '0'} pers.</p>
      <button class="btn" onclick="reset()">SEGÜENT</button>
    `;
    
    if (data.estat === "correcte") navigator.vibrate(200);
    else navigator.vibrate([100, 50, 100]);
  };

  function reset() {
    scanning = true;
    document.getElementById("result").className = "";
    document.getElementById("status-text").innerText = "📷 Esperant QR...";
    document.getElementById("data-display").innerHTML = "";
    document.getElementById("debug-url").innerText = "";
  }
</script>
</body>
</html>
